<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>시시콜콜 신분증 인증</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,sans-serif;background:#f5f5f5;min-height:100vh;display:flex;align-items:center;justify-content:center}
    .card{background:#fff;border-radius:16px;padding:24px;max-width:420px;width:100%;margin:16px;box-shadow:0 2px 16px rgba(0,0,0,.08)}
    h2{font-size:20px;margin-bottom:4px}
    .subtitle{font-size:12px;color:#999;margin-bottom:20px;word-break:break-all}
    .step{border-radius:10px;padding:16px;margin:10px 0;border:1px solid #e0e0e0;transition:.2s}
    .step.active{border-color:#1976D2;background:#f3f8ff}
    .step.done{border-color:#4CAF50;background:#e8f5e9}
    .step-title{font-weight:600;margin-bottom:8px;display:flex;align-items:center;gap:8px}
    .badge{font-size:11px;padding:2px 8px;border-radius:12px;background:#e0e0e0;color:#555}
    .badge.ok{background:#c8e6c9;color:#2e7d32}
    button{width:100%;padding:13px;font-size:15px;font-weight:600;border:none;border-radius:8px;cursor:pointer;margin-top:8px;transition:.15s}
    .btn-blue{background:#1976D2;color:#fff}
    video,canvas{width:100%;border-radius:8px;background:#000;margin:8px 0}
    #ocr-video{transform:none}
    .video-wrap{position:relative}
    .guide-box{
      position:absolute;
      left:50%;
      top:50%;
      width:88%;
      height:auto;
      aspect-ratio: 85.6 / 54; /* ISO ID-1: 85.6mm x 54mm (가로형) */
      transform: translate(-50%, -55%);
      border:3px solid rgba(25,118,210,.95);
      border-radius:10px;
      box-shadow:0 0 0 9999px rgba(0,0,0,.28);
      pointer-events:none;
    }
    .roi-profile-box{
      position:absolute;
      display:none;
      background:rgba(255,193,7,.78);
      border:2px solid rgba(255,152,0,1);
      border-radius:6px;
      color:#111;
      font-size:11px;
      font-weight:700;
      padding:4px 6px;
      pointer-events:none;
      z-index:3;
    }
    .ocr-msg{font-size:13px;color:#444;margin-top:4px;min-height:20px}
    #status{text-align:center;font-size:13px;color:#666;padding:8px 0;min-height:20px}
    .hint{font-size:12px;color:#666;margin-top:12px;line-height:1.5}
    a.face-link{display:inline-block;margin-top:8px;color:#1976D2;font-weight:600}
  </style>
</head>
<body>
<div class="card">
  <h2>신분증 OCR</h2>
  <p class="subtitle" id="auth-id-label"></p>
  <p class="hint" style="margin-bottom:12px">
    이 페이지는 <b>신분증 OCR 인증 페이지</b>입니다. 신분증을 네모칸에 맞추면 자동 촬영 후 OCR을 수행하고,
    결과가 서버 로그에 출력됩니다.
  </p>

  <div class="step active" id="step-ocr">
    <div class="step-title">촬영 <span class="badge" id="b-ocr">진행 중</span></div>
    <p style="font-size:13px;color:#555;margin-bottom:4px">신분증을 네모 박스에 맞춰주세요. 조건 충족 시 자동 촬영됩니다.</p>
    <div class="video-wrap">
      <video id="ocr-video" autoplay playsinline muted></video>
      <div class="guide-box"></div>
      <div class="roi-profile-box" id="roi-profile-box">OCR ROI</div>
    </div>
    <canvas id="ocr-canvas" style="display:none"></canvas>
    <div class="ocr-msg" id="ocr-quality-msg">카메라 준비 중...</div>
    <button class="btn-blue" id="btn-ocr-manual" onclick="captureOcrAndSend()">수동 촬영 (Fallback)</button>
    <pre id="ocr-result" style="font-size:11px;color:#777;margin-top:8px;white-space:pre-wrap"></pre>
    <p class="hint" id="next-hint" style="display:none">
      신분증 인식이 끝났습니다. 이어서
      <a class="face-link" id="face-link" href="#">얼굴 인증 페이지</a>에서 정면 얼굴 촬영을 완료해주세요.
    </p>
  </div>

  <p id="status">준비 중...</p>
</div>

<script>
const authId = (() => {
  const m = location.pathname.match(/\/ocr-auth\/([^\/]+)/);
  return m ? m[1] : null;
})();
const base = '';
document.getElementById('auth-id-label').textContent = 'session: ' + authId;
const faceLinkEl = document.getElementById('face-link');
if (faceLinkEl && authId) {
  faceLinkEl.href = base + '/auth/' + authId;
}

let _ocrReadyFrames = 0;
let _ocrChecking = false;
let _ocrCaptured = false;
let _ocrTimer = null;
let _ocrStream = null;

function setStatus(msg) { document.getElementById('status').textContent = msg; }

function applyRoiProfileBox(profile) {
  const box = document.getElementById('roi-profile-box');
  if (!box) return;
  box.style.left = (profile.roi_x1 * 100) + '%';
  box.style.top = (profile.roi_y1 * 100) + '%';
  box.style.width = ((profile.roi_x2 - profile.roi_x1) * 100) + '%';
  box.style.height = ((profile.roi_y2 - profile.roi_y1) * 100) + '%';
  box.style.display = 'block';
}

async function loadRoiProfileBox() {
  try {
    const r = await fetch(base + '/ocr-auth/config/roi-profile');
    if (!r.ok) return;
    const data = await r.json();
    if (data.exists && data.profile) {
      applyRoiProfileBox(data.profile);
    }
  } catch (_) {}
}

async function startOcrCamera() {
  const video = document.getElementById('ocr-video');
  setStatus('후면 카메라 요청 중...');
  try {
    _ocrStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 }, height: { ideal: 720 } },
    });
    video.srcObject = _ocrStream;
    setOcrMsg('카드를 네모 안에 맞춰주세요');
    _ocrChecking = true;
    _ocrTimer = setInterval(runOcrQualityCheck, 700);
    setStatus('촬영 준비됨');
  } catch (e) {
    setOcrMsg('후면 카메라 접근 실패: ' + e.message);
    setStatus('HTTPS 및 권한을 확인해주세요');
  }
}

function setOcrMsg(msg) {
  document.getElementById('ocr-quality-msg').textContent = msg;
}

function stopOcrCamera() {
  if (_ocrTimer) clearInterval(_ocrTimer);
  _ocrTimer = null;
  _ocrChecking = false;
  if (_ocrStream) {
    _ocrStream.getTracks().forEach(function (t) { t.stop(); });
    _ocrStream = null;
  }
}

function calcBlurMetric(gray, w, h) {
  let sum = 0, sum2 = 0, n = 0;
  for (let y = 1; y < h - 1; y += 2) {
    for (let x = 1; x < w - 1; x += 2) {
      const i = y * w + x;
      
      const lap = Math.abs(4 * gray[i] - gray[i - 1] - gray[i + 1] - gray[i - w] - gray[i + w]);
      sum += lap; sum2 += lap * lap; n++;
    }
  }
  if (!n) return 0;
  const mean = sum / n;
  return (sum2 / n) - (mean * mean);
}

function runOcrQualityCheck() {
  if (!_ocrChecking || _ocrCaptured) return;
  const video = document.getElementById('ocr-video');
  if (!video.videoWidth || !video.videoHeight) return;

  const canvas = document.getElementById('ocr-canvas');
  const ctx = canvas.getContext('2d', { willReadFrequently: true });
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  ctx.drawImage(video, 0, 0);

  const w = canvas.width, h = canvas.height;
  const frame = ctx.getImageData(0, 0, w, h).data;
  const gray = new Uint8Array(w * h);
  let sumL = 0, brightCount = 0;
  for (let i = 0, p = 0; i < frame.length; i += 4, p++) {
    const g = (frame[i] * 0.299 + frame[i + 1] * 0.587 + frame[i + 2] * 0.114) | 0;
    gray[p] = g;
    sumL += g;
    if (frame[i] > 245 && frame[i + 1] > 245 && frame[i + 2] > 245) brightCount++;
  }

  const brightness = sumL / (w * h);
  if (brightness < 70) {
    _ocrReadyFrames = 0;
    setOcrMsg('너무 어두워요');
    return;
  }

  const reflectionRatio = brightCount / (w * h);
  if (reflectionRatio > 0.12) {
    _ocrReadyFrames = 0;
    setOcrMsg('빛 반사가 있어요');
    return;
  }

  const blurVar = calcBlurMetric(gray, w, h);
  if (blurVar < 55) {
    _ocrReadyFrames = 0;
    setOcrMsg('이미지가 흐려요');
    return;
  }

  const videoRect = video.getBoundingClientRect();
  const guideRect = document.querySelector('.guide-box').getBoundingClientRect();
  const scaleX = videoRect.width > 0 ? (w / videoRect.width) : 1;
  const scaleY = videoRect.height > 0 ? (h / videoRect.height) : 1;
  const x1 = Math.max(0, Math.floor((guideRect.left - videoRect.left) * scaleX));
  const x2 = Math.min(w, Math.floor((guideRect.right - videoRect.left) * scaleX));
  const y1 = Math.max(0, Math.floor((guideRect.top - videoRect.top) * scaleY));
  const y2 = Math.min(h, Math.floor((guideRect.bottom - videoRect.top) * scaleY));
  if (x2 <= x1 || y2 <= y1) {
    _ocrReadyFrames = 0;
    setOcrMsg('가이드 박스를 다시 확인해주세요');
    return;
  }
  let edge = 0, total = 0;
  for (let y = y1; y < y2 - 1; y += 2) {
    for (let x = x1; x < x2 - 1; x += 2) {
      const i = y * w + x;
      const gx = Math.abs(gray[i] - gray[i + 1]);
      const gy = Math.abs(gray[i] - gray[i + w]);
      if (gx + gy > 40) edge++;
      total++;
    }
  }
  const edgeRatio = total ? (edge / total) : 0;
  // 네모칸 판정만 완화: 약간의 공백이 있어도 통과.
  if (edgeRatio < 0.03) {
    _ocrReadyFrames = 0;
    setOcrMsg('카드를 네모 안에 맞춰주세요');
    return;
  }

  _ocrReadyFrames += 1;
  setOcrMsg('품질 양호 — 자동 촬영 준비 중...');
  if (_ocrReadyFrames >= 3) {
    captureOcrAndSend();
  }
}

async function captureOcrAndSend() {
  if (_ocrCaptured) return;
  if (!authId) {
    setOcrMsg('세션 ID가 없습니다. 문자 링크로 다시 열어주세요.');
    return;
  }
  const video = document.getElementById('ocr-video');
  if (!video.videoWidth || !video.videoHeight) {
    setOcrMsg('카메라 준비가 아직 안 됐어요');
    return;
  }
  _ocrCaptured = true;
  _ocrChecking = false;
  if (_ocrTimer) clearInterval(_ocrTimer);
  setOcrMsg('OCR 전송 중...');

  const canvas = document.getElementById('ocr-canvas');
  const ctx = canvas.getContext('2d');
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  ctx.drawImage(video, 0, 0);

  canvas.toBlob(async (blob) => {
    const form = new FormData();
    form.append('file', blob, 'id_card.jpg');
    try {
      const r = await fetch(base + '/ocr-auth/' + authId + '/capture', { method: 'POST', body: form });
      const data = await r.json();
      document.getElementById('ocr-result').textContent = JSON.stringify(data, null, 2);
      if (data.status === 'success' && data.matched === false) {
        setOcrMsg('회원 정보가 일치하지 않습니다. 다시 촬영해주세요.');
        _ocrCaptured = false;
        _ocrChecking = true;
        _ocrReadyFrames = 0;
        _ocrTimer = setInterval(runOcrQualityCheck, 700);
      } else if (data.status === 'success') {
        setOcrMsg('OCR 인식됨 — 회원 정보 매칭 완료.');
        document.getElementById('step-ocr').className = 'step done';
        document.getElementById('b-ocr').textContent = '완료';
        document.getElementById('b-ocr').className = 'badge ok';
        document.getElementById('next-hint').style.display = 'block';
        setStatus('신분증 인증 완료 — 얼굴 인증 페이지로 이동해주세요.');
        _ocrCaptured = true;
      } else {
        setOcrMsg(data.reason ? ('재시도 필요: ' + data.reason) : '재시도 필요');
        _ocrCaptured = false;
        _ocrChecking = true;
        _ocrReadyFrames = 0;
        _ocrTimer = setInterval(runOcrQualityCheck, 700);
      }
    } catch (e) {
      setOcrMsg('OCR 요청 실패: ' + e.message);
      _ocrCaptured = false;
      _ocrChecking = true;
      _ocrTimer = setInterval(runOcrQualityCheck, 700);
    }
  }, 'image/jpeg', 0.92);
}

if (authId) {
  loadRoiProfileBox();
  startOcrCamera();
} else {
  setStatus('잘못된 주소입니다');
}
</script>
</body>
</html>
